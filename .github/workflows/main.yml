name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 is pinned because getlantern/systray's cgo build hardcodes
        # pkg-config webkit2gtk-4.0, which was dropped from ubuntu-24.04 (ubuntu-latest)
        os: [windows-latest, ubuntu-22.04]
        mode: [release, dev]
        go: ["1.23"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Install prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libappindicator3-dev libwebkit2gtk-4.0-dev

      - name: Build deej (Windows)
        if: runner.os == 'Windows'
        run: pkg/deej/scripts/windows/build-${{ matrix.mode }}.bat
        shell: cmd

      - name: Build deej (Linux)
        if: runner.os == 'Linux'
        run: pkg/deej/scripts/linux/build-${{ matrix.mode }}.sh

      # publish each build as a downloadable artifact so binaries can be grabbed from
      # any run without a local Go toolchain. Windows builds produce deej-<mode>.exe,
      # Linux builds produce deej-<mode>; both land at the repo root.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deej-${{ matrix.os }}-${{ matrix.mode }}
          path: |
            deej-${{ matrix.mode }}.exe
            deej-${{ matrix.mode }}
          if-no-files-found: ignore
          retention-days: 30
